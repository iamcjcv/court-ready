<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout Library">
<title>Court Ready — Workout Library</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0d0e;--bg2:#131415;--bg3:#1a1b1c;--bg4:#202122;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2efe9;--muted:#666462;--muted2:#8a8784;
  --accent:#e8c547;--accent-dim:rgba(232,197,71,0.12);
  --court:#3d9e7a;--court-dim:rgba(61,158,122,0.12);
  --gym:#5b82d4;--gym-dim:rgba(91,130,212,0.12);
  --cardio:#d4705b;--cardio-dim:rgba(212,112,91,0.12);
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.shell{max-width:430px;margin:0 auto;padding:calc(var(--safe-top)+20px) 16px calc(var(--safe-bottom)+32px)}

/* Header */
.hdr{margin-bottom:6px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.04em;line-height:1}
.logo em{color:var(--accent);font-style:normal}
.date-line{font-size:12px;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;font-weight:500}

/* Filters */
.filter-wrap{margin-bottom:20px}
.filter-lbl{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.filter-row{display:flex;gap:7px;flex-wrap:wrap}
.filter-btn{padding:8px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:99px;color:var(--muted2);font-size:13px;cursor:pointer;transition:all 0.14s;-webkit-user-select:none;user-select:none;font-family:'DM Sans',sans-serif;white-space:nowrap}
.filter-btn:active{transform:scale(0.96)}
.filter-btn.on{border-color:var(--gym);background:var(--gym-dim);color:var(--gym)}
.filter-btn.on-court{border-color:var(--court);background:var(--court-dim);color:var(--court)}
.filter-btn.on-cardio{border-color:var(--cardio);background:var(--cardio-dim);color:var(--cardio)}
.filter-btn.on-all{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}

/* Session blocks */
.session-block{margin-bottom:28px}
.sb-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border)}
.sb-icon{font-size:22px}
.sb-info{flex:1}
.sb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:2px}
.sb-meta{font-size:12px;color:var(--muted2);display:flex;gap:10px;flex-wrap:wrap}
.sb-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.tag-phase1{background:var(--gym-dim);color:var(--gym)}
.tag-phase2{background:var(--accent-dim);color:var(--accent)}
.tag-court{background:var(--court-dim);color:var(--court)}

/* Exercise cards */
.ex-list{display:flex;flex-direction:column;gap:8px}
.ex-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s}
.ex-card.expanded{border-color:var(--border2)}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ex-header:active{background:var(--bg3)}
.ex-muscle{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:3px;line-height:1.2}
.ex-tags{display:flex;gap:5px;flex-wrap:wrap}
.ex-tag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap}
.tag-primary{background:rgba(91,130,212,0.15);color:var(--gym)}
.tag-secondary{background:rgba(61,158,122,0.12);color:var(--court)}
.tag-equipment{background:var(--bg3);color:var(--muted2);border:0.5px solid var(--border)}
.ex-chevron{color:var(--muted);font-size:16px;flex-shrink:0;transition:transform 0.2s}
.ex-card.expanded .ex-chevron{transform:rotate(180deg)}

/* Expand body */
.ex-body{display:none;padding:0 15px 16px;border-top:0.5px solid var(--border)}
.ex-card.expanded .ex-body{display:block}
.ex-section{margin-top:14px}
.ex-section-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ex-why{font-size:13px;color:var(--muted2);line-height:1.65;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);border-left:2px solid var(--gym)}
.ex-steps{display:flex;flex-direction:column;gap:7px}
.ex-step{display:flex;gap:10px;align-items:flex-start}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--gym-dim);color:var(--gym);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--muted2);line-height:1.55;flex:1}
.step-text strong{color:var(--text);font-weight:500}
.ex-sets{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
.ex-set-box{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.ex-set-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}
.ex-set-l{font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px}
.ex-comeback{font-size:12px;color:var(--court);background:var(--court-dim);padding:8px 11px;border-radius:var(--radius-sm);line-height:1.55;margin-top:2px}

/* Links */
.ex-links{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.ex-link{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.link-wiki{background:var(--gym-dim);color:var(--gym);border:0.5px solid var(--gym)}
.link-yt{background:rgba(220,50,50,0.12);color:#e05555;border:0.5px solid rgba(220,50,50,0.3)}
.link-wiki:hover,.link-yt:hover{opacity:0.85}

/* Session purpose */
.session-purpose{font-size:13px;color:var(--muted2);line-height:1.7;padding:12px 14px;background:var(--bg2);border-radius:var(--radius-sm);border-left:2px solid var(--accent);margin-bottom:14px}
.session-purpose strong{color:var(--accent);font-weight:500}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;line-height:1.8}

/* Phase divider */
.phase-div{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.phase-div-line{flex:1;height:0.5px;background:var(--border)}
.phase-div-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}

/* Sticky search */
.search-wrap{position:sticky;top:0;background:var(--bg);padding:10px 0 12px;z-index:10;margin-bottom:4px}
.search-input{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px 11px 38px;outline:none;-webkit-appearance:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--gym)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.search-box{position:relative}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="logo">workout<em>.</em>library</div>
  </div>
  <div class="date-line">Court Ready · Comeback era workout guide</div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search exercises..." oninput="filterAll()">
    </div>
  </div>

  <div class="filter-wrap">
    <div class="filter-lbl">Filter by focus</div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn on-all" onclick="setFilter('all',this)">All sessions</button>
      <button class="filter-btn" onclick="setFilter('lower',this)">Lower body</button>
      <button class="filter-btn" onclick="setFilter('upper',this)">Upper body</button>
      <button class="filter-btn" onclick="setFilter('core',this)">Core + agility</button>
      <button class="filter-btn" onclick="setFilter('jump',this)">Jump + power</button>
      <button class="filter-btn" onclick="setFilter('full',this)">Full body</button>
    </div>
  </div>

  <div id="libraryRoot"></div>

</div>

<script>
const SESSIONS = [
  {
    id:'lower',
    title:'Lower body — quad, glute & ankle',
    icon:'🦵',
    phase:'Phase 1 + 2',
    phaseTag:'phase1',
    courtTag:true,
    duration:'45–55 min',
    purpose:'Your court performance lives here. Quad strength drives your jump. Glute strength stabilizes your landing. Slow calf eccentrics protect your Achilles — the #1 comeback injury for returning VB players. Do this session before any court week.',
    exercises:[
      {
        id:'goblet-squat',
        name:'Goblet squat',
        muscle:'🦵',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Quads',
        secondary:'Glutes',
        equipment:'Dumbbell',
        sets:'3',reps:'12',rest:'75 sec',
        why:'Best solo squat — no spotter needed, naturally upright posture keeps your knees tracking safely. Perfect for rebuilding quad strength from scratch.',
        steps:[
          'Hold a dumbbell vertically at chest height, elbows pointing down',
          'Feet shoulder-width, toes slightly out',
          '<strong>Slow down:</strong> 3 seconds lowering, pause at bottom',
          'Drive through heels to stand — squeeze glutes at the top',
          'Keep chest tall throughout — don\'t round forward'
        ],
        comeback:'The slow eccentric (lowering phase) rebuilds tendon strength faster than the concentric. This is your Achilles and patellar tendon insurance policy.',
        wiki:'https://musclewiki.com/dumbbells/male/quads/dumbbell-goblet-squat',
        yt:'https://www.youtube.com/results?search_query=goblet+squat+form+tutorial'
      },
      {
        id:'leg-press',
        name:'Leg press (machine)',
        muscle:'🦵',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Quads',
        secondary:'Glutes, Hamstrings',
        equipment:'Machine',
        sets:'3',reps:'10–12',rest:'90 sec',
        why:'Controlled quad overload with zero spotter risk. The machine path keeps your knees safe while you build strength.',
        steps:[
          'Set seat so knees form ~90° when platform is loaded',
          'Feet shoulder-width, mid-platform — not too high or low',
          'Lower slowly until 90°, pause briefly',
          'Press through heels — <strong>do not lock knees out</strong> at the top',
          'Never let the weight crash down — stay in control'
        ],
        comeback:'Heavier loading than goblet squat with no balance or spotter risk. Progress this as your Phase 1 base builder.',
        wiki:'https://musclewiki.com/machine/male/quads/leg-press',
        yt:'https://www.youtube.com/results?search_query=leg+press+machine+proper+form'
      },
      {
        id:'lateral-band-walk',
        name:'Lateral band walk',
        muscle:'🍑',
        muscleBg:'rgba(61,158,122,0.12)',
        primary:'Glute medius',
        secondary:'Hip abductors',
        equipment:'Resistance band',
        sets:'3',reps:'15 each side',rest:'45 sec',
        why:'The glute medius is the stabilizer for every lateral movement on court. Weak here = knees caving on landing approaches. This one exercise protects you more than most.',
        steps:[
          'Place band just above or just below knees',
          'Slight bend in knees, slight hip hinge — athletic stance',
          'Step sideways keeping tension in the band throughout',
          '<strong>Don\'t let feet touch</strong> at any point — keep tension',
          '15 steps right, 15 steps left = 1 set'
        ],
        comeback:'This directly trains the hip stability you use for lateral shuffles, approach jumps, and defensive slides. Court-specific strength.',
        wiki:'https://musclewiki.com/band/male/glutes/banded-lateral-walk',
        yt:'https://www.youtube.com/results?search_query=lateral+band+walk+glute+medius+tutorial'
      },
      {
        id:'step-up',
        name:'Dumbbell step-up',
        muscle:'🦵',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Quads',
        secondary:'Glutes, Balance',
        equipment:'Dumbbells + bench/box',
        sets:'3',reps:'10 each leg',rest:'60 sec',
        why:'Single-leg strength is what actually happens on court — you plant and push off one leg at a time. Step-ups train that pattern safely.',
        steps:[
          'Hold dumbbells at sides, stand facing a bench or sturdy box (knee height)',
          'Step up with one foot, drive through that heel to stand on the box',
          '<strong>Pause at the top</strong> — don\'t rush',
          'Lower the trailing leg slowly back down — 2 seconds',
          'Complete all reps on one side before switching'
        ],
        comeback:'The controlled lowering phase is single-leg eccentric training — exactly what your knee absorbs during approach jumps.',
        wiki:'https://musclewiki.com/dumbbells/male/quads/dumbbell-step-up',
        yt:'https://www.youtube.com/results?search_query=dumbbell+step+up+proper+form'
      },
      {
        id:'calf-raise',
        name:'Single-leg calf raise (slow eccentric)',
        muscle:'🦶',
        muscleBg:'rgba(61,158,122,0.12)',
        primary:'Gastrocnemius',
        secondary:'Soleus, Achilles tendon',
        equipment:'Step or flat floor',
        sets:'3',reps:'12 each leg',rest:'60 sec',
        why:'The most important injury prevention exercise for returning volleyball players. The slow lowering phase specifically strengthens the Achilles tendon — not just the muscle.',
        steps:[
          'Stand on one foot on the edge of a step (or flat ground)',
          'Rise up on the ball of your foot — 1 second up',
          '<strong>Lower over 4–5 seconds</strong> — this is the key',
          'Let heel drop below step level if using a step',
          'Hold a wall or machine for balance only — not for support'
        ],
        comeback:'Athletes returning from long breaks have deconditioned tendons even when muscles feel strong. This exercise specifically targets the tendon. Non-negotiable.',
        wiki:'https://musclewiki.com/bodyweight/male/calves/single-leg-calf-raise',
        yt:'https://www.youtube.com/results?search_query=eccentric+calf+raise+achilles+tendon+rehabilitation'
      },
      {
        id:'leg-curl',
        name:'Seated leg curl (machine)',
        muscle:'🦵',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Hamstrings',
        secondary:'Posterior chain',
        equipment:'Machine',
        sets:'3',reps:'12',rest:'75 sec',
        why:'Balanced knee — quads and hamstrings need to be trained together. Hamstring weakness relative to quads is a major ACL risk factor for court athletes.',
        steps:[
          'Adjust machine pad to sit just above ankles',
          'Back flat, hands on side handles',
          'Curl legs down slowly — <strong>2 seconds down, 1 up</strong>',
          'Squeeze hamstrings at full flexion briefly',
          'Don\'t let the weight crash back — control the return'
        ],
        comeback:'Hamstring-to-quad strength ratio protects your ACL on landing. This is the balance exercise that makes your jump training safer.',
        wiki:'https://musclewiki.com/machine/male/hamstrings/seated-leg-curl',
        yt:'https://www.youtube.com/results?search_query=seated+leg+curl+machine+form'
      }
    ]
  },
  {
    id:'upper',
    title:'Upper body — shoulder, back & chest',
    icon:'💪',
    phase:'Phase 1 + 2',
    phaseTag:'phase1',
    courtTag:true,
    duration:'45–55 min',
    purpose:'Volleyball spiking is a shoulder sport. But shoulder injury is the #1 upper body risk for returning VB players — usually from imbalanced training (too much pushing, not enough pulling). This session is deliberately pull-heavy. Every exercise here either directly supports spiking mechanics or protects your shoulder from breakdown.',
    exercises:[
      {
        id:'cable-row',
        name:'Seated cable row',
        muscle:'🏋️',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Lats, Mid-back',
        secondary:'Biceps, Rear delts',
        equipment:'Cable machine',
        sets:'4',reps:'12',rest:'75 sec',
        why:'The primary pulling movement that balances out all the pressing volleyball does to your shoulder. Strong lats = stable shoulder = harder spike with less injury risk.',
        steps:[
          'Sit upright, feet on platform, slight bend in knees',
          'Grab handle, start with arms extended and back neutral',
          'Pull handle to lower chest — <strong>elbows drive back, not out</strong>',
          'Squeeze shoulder blades together at the end',
          'Return slowly — 3 seconds — don\'t let shoulders round forward'
        ],
        comeback:'Returning athletes almost always have overdeveloped chest and underdeveloped back from years of casual training. Fix this first.',
        wiki:'https://musclewiki.com/cables/male/lats/cable-seated-row',
        yt:'https://www.youtube.com/results?search_query=seated+cable+row+proper+form+back'
      },
      {
        id:'face-pull',
        name:'Cable face pull',
        muscle:'🎯',
        muscleBg:'rgba(61,158,122,0.12)',
        primary:'Rear deltoids',
        secondary:'Rotator cuff, Traps',
        equipment:'Cable machine + rope',
        sets:'3',reps:'15',rest:'45 sec',
        why:'The single best shoulder health exercise. Trains the muscles that decelerate your arm after a spike — exactly what gets overloaded and damaged over time.',
        steps:[
          'Set cable to upper chest/eye level, use rope attachment',
          'Pull rope toward your face, <strong>hands finishing beside ears</strong>',
          'Elbows stay high — parallel to floor throughout',
          'Pause and squeeze rear delts at full pull',
          'Use light weight — this is technique, not strength'
        ],
        comeback:'Every spike stresses your rotator cuff on deceleration. Face pulls train the muscles that absorb that stress. Do this every upper body session.',
        wiki:'https://musclewiki.com/cables/male/shoulders/cable-face-pull',
        yt:'https://www.youtube.com/results?search_query=cable+face+pull+proper+form+shoulder+health'
      },
      {
        id:'lat-pulldown',
        name:'Lat pulldown (cable)',
        muscle:'🏋️',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Lats',
        secondary:'Biceps, Teres major',
        equipment:'Cable machine',
        sets:'3',reps:'10–12',rest:'75 sec',
        why:'Builds the pulling strength needed for powerful arm swings and overhead control. The cable version is safer than weighted pull-ups when returning from a long break.',
        steps:[
          'Sit with thighs under pad, lean back slightly (not excessively)',
          'Grip bar wider than shoulder width, overhand',
          'Pull bar to upper chest — <strong>drive elbows down and back</strong>',
          'Squeeze lats at bottom, don\'t let shoulders shrug up',
          'Return slowly — 3 seconds — full stretch at top'
        ],
        comeback:'The lat pull pattern directly transfers to spiking — the arm swing uses the same muscles. Build this strong before adding jump spike volume.',
        wiki:'https://musclewiki.com/cables/male/lats/cable-lat-pulldown',
        yt:'https://www.youtube.com/results?search_query=lat+pulldown+proper+form+technique'
      },
      {
        id:'db-shoulder-press',
        name:'Dumbbell shoulder press (seated)',
        muscle:'💪',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Deltoids',
        secondary:'Triceps, Upper traps',
        equipment:'Dumbbells + bench',
        sets:'3',reps:'10',rest:'75 sec',
        why:'Overhead pressing strength for blocking and reaching. Dumbbells over barbell — each arm works independently, preventing the stronger side from compensating.',
        steps:[
          'Sit on bench with back supported, dumbbells at shoulder height',
          'Elbows at 90° to start — <strong>don\'t go lower at the bottom</strong>',
          'Press up and slightly in — meet at the top without banging',
          'Control the lowering — 2–3 seconds down',
          'Keep core braced — don\'t arch your back to press'
        ],
        comeback:'Solo-safe pressing movement. No barbell bench needed — dumbbells give more natural shoulder rotation path which is safer for returning athletes.',

      {
        id:'external-rotation',

        muscleBg:'rgba(61,158,122,0.12)',

        secondary:'Rear delts',
        equipment:'Cable machine',
        sets:'2',reps:'15 each arm',rest:'45 sec',

        steps:[
          'Stand side-on to cable machine, cable at elbow height',

          'Pause at end range, return slowly',
          'Use very light weight — this is precision, not load'
        ],
        comeback:'Rotator cuff injuries are cumulative — they build silently over months. This exercise is the prevention, not the cure. Do it now.',

      {
        id:'tricep-pushdown',
        name:'Cable tricep pushdown',
        muscle:'💪',
        muscleBg:'rgba(91,130,212,0.15)',
        primary:'Triceps',
        secondary:'Forearm stabilizers',
        equipment:'Cable machine + rope',
        sets:'3',reps:'12–15',rest:'60 sec',
        why:'Tricep strength contributes to the final snap at the end of a spike. Also a finishing push exercise that requires no spotter.',
        steps:[
          'Stand facing cable, rope at upper chest height',
          'Elbows pinned to sides — <strong>they don\'t move</strong>',
          'Push rope down and slightly apart at the bottom',
          'Squeeze triceps at full extension',
          'Control the return — don\'t let elbows flare'
        ],
        comeback:'Elbow extension strength and control. Your forearm also absorbs impact on every receive — this builds that stability.',

      }

  },
  {
    id:'core',
    title:'Core + agility — anti-rotation & lateral speed',
    icon:'⚡',
    phase:'Phase 1 + 2',
    phaseTag:'phase1',
    courtTag:true,
    duration:'35–45 min',
    purpose:'Core training for athletes isn\'t about crunches — it\'s about resisting rotation and transferring force. Every spike, every approach jump, every lateral shuffle starts with your core. This session also builds the reactive lateral speed that separates you from the treadmill crowd.',

let activeFilter='all';
let activeSearch='';

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.className='filter-btn';
  });
  const cls=f==='all'?'on-all':f==='lower'||f==='upper'||f==='jump'?'on':'on-court';
  el.className='filter-btn '+cls;
  renderAll();
}

function filterAll(){
  activeSearch=document.getElementById('searchInput').value.toLowerCase().trim();
  renderAll();
}

function renderAll(){
  const root=document.getElementById('libraryRoot');
  root.innerHTML='';
  let shown=0;
  SESSIONS.forEach(session=>{
    if(activeFilter!=='all'&&session.id!==activeFilter) return;
    const matchingEx=activeSearch?session.exercises.filter(ex=>
      ex.name.toLowerCase().includes(activeSearch)||
      ex.primary.toLowerCase().includes(activeSearch)||
      (ex.secondary||'').toLowerCase().includes(activeSearch)||
      ex.equipment.toLowerCase().includes(activeSearch)
    ):session.exercises;
    if(activeSearch&&matchingEx.length===0) return;
    shown++;
    const block=document.createElement('div');
    block.className='session-block';
    block.innerHTML=`
      <div class="sb-head">
        <div class="sb-icon">${session.icon}</div>
        <div class="sb-info">
          <div class="sb-title">${session.title}</div>
          <div class="sb-meta">
            <span>⏱ ${session.duration}</span>
            <span>${session.phase}</span>
            ${session.courtTag?'<span class="sb-tag tag-court">Court-specific</span>':''}
          </div>
        </div>
      </div>
      <div class="session-purpose">${session.purpose}</div>
      <div class="ex-list" id="exList-${session.id}"></div>
    `;
    root.appendChild(block);
    const exList=document.getElementById('exList-'+session.id);
    const exToShow=activeSearch?matchingEx:session.exercises;
    exToShow.forEach(ex=>{renderEx(ex,exList,session.id);});
  });
  if(shown===0){
    root.innerHTML='<div class="empty">No exercises found.<br>Try a different search or filter.</div>';
  }
}

function renderEx(ex,container,sessionId){
  const div=document.createElement('div');
  div.className='ex-card';
  div.id='ex-'+ex.id;
  div.innerHTML=`
    <div class="ex-header" onclick="toggleEx('${ex.id}')">
      <div class="ex-muscle" style="background:${ex.muscleBg}">${ex.muscle}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-tags">
          <span class="ex-tag tag-primary">${ex.primary}</span>
          ${ex.secondary?`<span class="ex-tag tag-secondary">${ex.secondary}</span>`:''}
          <span class="ex-tag tag-equipment">${ex.equipment}</span>
        </div>
      </div>
      <span class="ex-chevron">▾</span>
    </div>
    <div class="ex-body">
      <div class="ex-sets">
        <div class="ex-set-box">
          <div class="ex-set-n" style="color:var(--gym)">${ex.sets}</div>
          <div class="ex-set-l">sets</div>
        </div>
        <div class="ex-set-box">
          <div class="ex-set-n" style="color:var(--court)">${ex.reps}</div>
          <div class="ex-set-l">reps</div>
        </div>
      </div>
      <div class="ex-section">
        <div class="ex-section-lbl">Why this exercise</div>
        <div class="ex-why">${ex.why}</div>
      </div>
      <div class="ex-section">
        <div class="ex-section-lbl">How to do it</div>
        <div class="ex-steps">
          ${ex.steps.map((s,i)=>`<div class="ex-step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}
        </div>
      </div>
      <div class="ex-section">
        <div class="ex-section-lbl">Your comeback context</div>
        <div class="ex-comeback">${ex.comeback}</div>
      </div>
      <div class="ex-links">
        <a class="ex-link link-wiki" href="${ex.wiki}" target="_blank">🔗 MuscleWiki demo</a>
        <a class="ex-link link-yt" href="${ex.yt}" target="_blank">▶ YouTube tutorial</a>
      </div>
    </div>
  `;
  container.appendChild(div);
}

function toggleEx(id){
  const card=document.getElementById('ex-'+id);
  card.classList.toggle('expanded');
}

renderAll();
